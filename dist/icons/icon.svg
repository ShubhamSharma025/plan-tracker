<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  
  <!-- Outer glowing rings -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="url(#blue-green-grad)" stroke-width="6" stroke-opacity="0.3" />
  
  <!-- Calendar Grid Lines (Minimalist representation) -->
  <g opacity="0.15">
    <line x1="96" y1="180" x2="416" y2="180" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" />
    <line x1="96" y1="260" x2="416" y2="260" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" />
    <line x1="96" y1="340" x2="416" y2="340" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" />
    <line x1="176" y1="120" x2="176" y2="400" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" />
    <line x1="256" y1="120" x2="256" y2="400" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" />
    <line x1="336" y1="120" x2="336" y2="400" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" />
  </g>

  <!-- Blue GATE Line & Progress -->
  <path d="M 120 320 L 220 220 L 320 280 L 400 160" fill="none" stroke="#2563EB" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-blue)" />
  <circle cx="400" cy="160" r="16" fill="#2563EB" filter="url(#glow-blue)" />

  <!-- Green Job Line & Progress -->
  <path d="M 120 380 L 200 300 L 300 340 L 400 220" fill="none" stroke="#16A34A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-green)" />
  <circle cx="400" cy="220" r="16" fill="#16A34A" filter="url(#glow-green)" />

  <!-- Checkmark representing completion -->
  <g transform="translate(370, 90) scale(0.8)">
    <circle cx="30" cy="30" r="28" fill="#16A34A" />
    <path d="M 18 30 L 26 38 L 42 20" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Gradients & Filters definitions -->
  <defs>
    <linearGradient id="blue-green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#16A34A" />
    </linearGradient>
    
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
</svg>
